<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LetzRyd · Walk-In Registry</title>
  </head>
  <body>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.body.innerHTML = '<div style="padding: 20px; color: red;"><h1>Global Error</h1><pre>' + msg + '</pre><pre>' + (error ? error.stack : '') + '</pre></div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="padding: 20px; color: red;"><h1>Unhandled Promise</h1><pre>' + event.reason + '</pre></div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
